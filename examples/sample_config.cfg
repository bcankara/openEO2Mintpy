##------ Sample MintPy Configuration for Dolphin Outputs ------##
## Generated by dolphin2mintpy
## Run with: smallbaselineApp.py sample_config.cfg

########## Load Data ##########
mintpy.load.processor      = hyp3
mintpy.load.autoPath       = no

## Unwrapped interferograms
mintpy.load.unwFile        = /path/to/unwrapped/*.unw.tif
## Coherence
mintpy.load.corFile        = /path/to/interferograms/*.int.cor.tif
## Connected components (optional)
mintpy.load.connCompFile   = /path/to/unwrapped/*.unw.conncomp.tif

## Geometry files (optional, but recommended)
mintpy.load.demFile        = auto
mintpy.load.incAngleFile   = auto
mintpy.load.azAngleFile    = auto
mintpy.load.waterMaskFile  = auto

########## Reference Point ##########
mintpy.reference.lalo      = auto

########## Network Inversion ##########
mintpy.networkInversion.weightFunc = no

########## Tropospheric Delay Correction ##########
mintpy.troposphericDelay.method = no

########## Topographic Residual (DEM Error) ##########
mintpy.topographicResidual = no

########## Velocity Estimation ##########
mintpy.deramp              = no

########## Output ##########
mintpy.save.hdfEos5        = no
mintpy.save.kmz            = yes
