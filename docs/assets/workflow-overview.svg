<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">openEO2Mintpy workflow overview</title>
  <desc id="desc">Workflow from openEO three-band GeoTIFFs through splitting, alignment, metadata preparation, MintPy load_data, post-load processor fix, and time-series analysis.</desc>
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fcff"/>
      <stop offset="1" stop-color="#eef7f3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f9bb4"/>
      <stop offset="1" stop-color="#2d8f93"/>
    </linearGradient>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M0 0L13 6.5L0 13Z" fill="#2d6f87"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#143040" flood-opacity="0.11"/>
    </filter>
    <style>
      .label{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#142f3b}
      .mono{font-family:JetBrains Mono,Consolas,monospace;fill:#415862}
      .small{font-size:18px}
      .tiny{font-size:15px}
      .title{font-size:24px;font-weight:800}
      .stage{font-size:16px;font-weight:800;letter-spacing:.5px;fill:#2d6f87}
    </style>
  </defs>

  <rect width="1200" height="620" rx="34" fill="url(#top)"/>
  <text x="60" y="62" class="label title">openEO2Mintpy processing chain</text>
  <text x="60" y="92" class="label small" fill="#55717a">A compact bridge from openEO Sentinel-1 InSAR products to MintPy-ready input stacks.</text>

  <g filter="url(#shadow)">
    <rect x="58" y="142" width="176" height="150" rx="18" fill="#ffffff" stroke="#c9dfe4"/>
    <text x="82" y="174" class="stage">INPUT</text>
    <text x="82" y="208" class="label small" font-weight="700">openEO GeoTIFFs</text>
    <text x="82" y="237" class="mono tiny">Band 1 phase</text>
    <text x="82" y="263" class="mono tiny">Band 2 unw</text>
    <text x="82" y="289" class="mono tiny">Band 3 cor</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="294" y="142" width="176" height="150" rx="18" fill="#ffffff" stroke="#c9dfe4"/>
    <text x="318" y="174" class="stage">STAGE 0</text>
    <text x="318" y="208" class="label small" font-weight="700">Split bands</text>
    <text x="318" y="237" class="mono tiny">*.unw.tif</text>
    <text x="318" y="263" class="mono tiny">*.cor.tif</text>
    <text x="318" y="289" class="label tiny" fill="#55717a">date-safe names</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="530" y="142" width="176" height="150" rx="18" fill="#ffffff" stroke="#c9dfe4"/>
    <text x="554" y="174" class="stage">STAGE 0B</text>
    <text x="554" y="208" class="label small" font-weight="700">Align stack</text>
    <text x="554" y="237" class="label tiny" fill="#55717a">common bounds</text>
    <text x="554" y="263" class="label tiny" fill="#55717a">common grid</text>
    <text x="554" y="289" class="mono tiny">GDAL warp</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="766" y="142" width="176" height="150" rx="18" fill="#ffffff" stroke="#c9dfe4"/>
    <text x="790" y="174" class="stage">STAGE 1</text>
    <text x="790" y="208" class="label small" font-weight="700">Prepare MintPy</text>
    <text x="790" y="237" class="mono tiny">*.rsc</text>
    <text x="790" y="263" class="mono tiny">mintpy_config</text>
    <text x="790" y="289" class="label tiny" fill="#55717a">metadata sidecars</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1002" y="142" width="140" height="150" rx="18" fill="#ffffff" stroke="#c9dfe4"/>
    <text x="1026" y="174" class="stage">MINTPY</text>
    <text x="1026" y="208" class="label small" font-weight="700">load_data</text>
    <text x="1026" y="237" class="mono tiny">ifgramStack.h5</text>
    <text x="1026" y="263" class="mono tiny">geometry*.h5</text>
  </g>

  <path d="M238 217H285" stroke="#2d6f87" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  <path d="M474 217H521" stroke="#2d6f87" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  <path d="M710 217H757" stroke="#2d6f87" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  <path d="M946 217H993" stroke="#2d6f87" stroke-width="5" marker-end="url(#arrow)" fill="none"/>

  <g filter="url(#shadow)">
    <rect x="352" y="380" width="226" height="112" rx="18" fill="#ffffff" stroke="#d7e7dd"/>
    <text x="380" y="415" class="stage">OPTIONAL DEM</text>
    <text x="380" y="448" class="label small" font-weight="700">NASADEM tiles</text>
    <text x="380" y="474" class="label tiny" fill="#55717a">extract, merge, warp to stack grid</text>
  </g>

  <path d="M465 374V306" stroke="#2d8f93" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  <path d="M578 436H760" stroke="#2d8f93" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  <path d="M760 436Q854 436 854 306" stroke="#2d8f93" stroke-width="5" marker-end="url(#arrow)" fill="none"/>

  <g filter="url(#shadow)">
    <rect x="766" y="380" width="176" height="112" rx="18" fill="#ffffff" stroke="#c9dfe4"/>
    <text x="790" y="415" class="stage">STAGE 2</text>
    <text x="790" y="448" class="label small" font-weight="700">Post-load fix</text>
    <text x="790" y="474" class="mono tiny">hyp3 -> isce</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1002" y="380" width="140" height="112" rx="18" fill="#ffffff" stroke="#c9dfe4"/>
    <text x="1026" y="415" class="stage">OUTPUT</text>
    <text x="1026" y="448" class="label small" font-weight="700">SBAS chain</text>
    <text x="1026" y="474" class="mono tiny">timeseries.h5</text>
  </g>

  <path d="M1072 300V354" stroke="#2d6f87" stroke-width="5" marker-end="url(#arrow)" fill="none"/>
  <path d="M946 436H993" stroke="#2d6f87" stroke-width="5" marker-end="url(#arrow)" fill="none"/>

  <rect x="60" y="548" width="1080" height="8" rx="4" fill="url(#accent)" opacity=".85"/>
  <text x="60" y="584" class="label tiny" fill="#55717a">Core promise: keep raster values intact, fix format and metadata friction, and hand MintPy a coherent stack.</text>
</svg>
