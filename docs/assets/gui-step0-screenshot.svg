<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720" role="img" aria-labelledby="title desc">
  <title id="title">openEO2Mintpy GUI Step 0 screenshot</title>
  <desc id="desc">Vector preview of the openEO2Mintpy Tkinter interface showing the Split and Align tab, DEM preparation fields, and processing log.</desc>
  <defs>
    <filter id="windowShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#18242b" flood-opacity="0.18"/>
    </filter>
    <style>
      .ui{font-family:Segoe UI,Tahoma,Arial,sans-serif;fill:#1d2428}
      .mono{font-family:Consolas,JetBrains Mono,monospace;fill:#141a1d}
      .muted{fill:#565f64}
      .caption{font-size:14px}
      .small{font-size:13px}
      .tiny{font-size:12px}
    </style>
  </defs>

  <rect width="980" height="720" fill="#f5f7f8"/>
  <g transform="translate(34 24)" filter="url(#windowShadow)">
    <rect width="912" height="672" rx="8" fill="#d8d6cf" stroke="#0a0a0a" stroke-width="2"/>
    <rect x="0" y="0" width="912" height="28" rx="8" fill="#f3f3f3" stroke="#0a0a0a" stroke-width="2"/>
    <rect x="0" y="20" width="912" height="10" fill="#f3f3f3"/>
    <text x="456" y="20" text-anchor="middle" class="ui caption" font-weight="700">openEO2Mintpy</text>
    <rect x="812" y="8" width="28" height="16" fill="#dfdfdf" stroke="#0a0a0a"/>
    <rect x="846" y="8" width="28" height="16" fill="#dfdfdf" stroke="#0a0a0a"/>
    <rect x="880" y="8" width="24" height="16" fill="#dfdfdf" stroke="#0a0a0a"/>

    <text x="22" y="58" class="mono tiny">openEO2Mintpy</text>
    <text x="22" y="78" class="mono tiny">Bridge between openEO Sentinel-1 InSAR outputs and MintPy. Work through the tabs in order.</text>

    <g transform="translate(22 96)">
      <rect x="0" y="0" width="118" height="27" fill="#f2f2f0" stroke="#8f8f89"/>
      <rect x="118" y="-5" width="205" height="32" fill="#d1cec6" stroke="#8f8f89"/>
      <rect x="323" y="0" width="128" height="27" fill="#c9c6bd" stroke="#8f8f89"/>
      <text x="12" y="18" class="mono tiny">0. Split &amp; Align</text>
      <text x="130" y="15" class="mono tiny" font-weight="700">1. Prepare (pre load_data)</text>
      <text x="336" y="18" class="mono tiny">2. Post-Load Fix</text>
    </g>

    <g transform="translate(22 123)">
      <rect x="0" y="0" width="868" height="536" fill="#d8d6cf" stroke="#8f8f89"/>
      <text x="16" y="30" class="mono tiny">Step 0 - Split &amp; Align openEO GeoTIFFs</text>
      <text x="16" y="52" class="mono tiny muted">Extracts Band 2 (Unwrapped Phase) and Band 3 (Coherence) from openEO GeoTIFFs, then aligns all rasters to a common grid.</text>

      <rect x="13" y="72" width="842" height="104" fill="#dedbd3" stroke="#8f8f89"/>
      <rect x="30" y="64" width="150" height="18" fill="#d8d6cf"/>
      <text x="42" y="78" class="mono tiny">Bands Splitter Inputs</text>

      <text x="28" y="108" class="mono tiny">openEO input directory  *</text>
      <text x="28" y="147" class="mono tiny">Output unwrapped directory  *</text>
      <text x="28" y="186" class="mono tiny">Output coherence directory  *</text>
      <rect x="250" y="94" width="525" height="24" fill="#f7f7f4" stroke="#8f8f89"/>
      <rect x="250" y="133" width="525" height="24" fill="#f7f7f4" stroke="#8f8f89"/>
      <rect x="250" y="172" width="525" height="24" fill="#f7f7f4" stroke="#8f8f89"/>
      <text x="260" y="111" class="mono tiny">/mnt/w/tubitak3501_merzifon/process/asc</text>
      <text x="260" y="150" class="mono tiny">/mnt/w/tubitak3501_merzifon/process/asc_processed/unw</text>
      <text x="260" y="189" class="mono tiny">/mnt/w/tubitak3501_merzifon/process/asc_processed/cor</text>
      <g class="mono tiny">
        <rect x="785" y="89" width="82" height="32" fill="#d8d6cf" stroke="#8f8f89"/>
        <rect x="785" y="128" width="82" height="32" fill="#d8d6cf" stroke="#8f8f89"/>
        <rect x="785" y="167" width="82" height="32" fill="#d8d6cf" stroke="#8f8f89"/>
        <text x="802" y="110">Browse...</text>
        <text x="802" y="149">Browse...</text>
        <text x="802" y="188">Browse...</text>
        <text x="883" y="110" fill="#1565c0">?</text>
        <text x="883" y="149" fill="#1565c0">?</text>
        <text x="883" y="188" fill="#1565c0">?</text>
      </g>

      <rect x="13" y="188" width="108" height="30" fill="#d8d6cf" stroke="#8f8f89"/>
      <rect x="128" y="188" width="108" height="30" fill="#d8d6cf" stroke="#8f8f89"/>
      <rect x="645" y="188" width="92" height="30" fill="#d8d6cf" stroke="#8f8f89"/>
      <rect x="745" y="188" width="110" height="30" fill="#d8d6cf" stroke="#8f8f89"/>
      <text x="25" y="208" class="mono tiny">Load settings</text>
      <text x="139" y="208" class="mono tiny">Save settings</text>
      <text x="676" y="208" class="mono tiny">Quit</text>
      <text x="760" y="208" class="mono tiny" fill="#8a8a8a">Split &amp; Align</text>

      <rect x="13" y="231" width="842" height="18" fill="#c8c5bc" stroke="#8f8f89"/>

      <rect x="13" y="276" width="842" height="130" fill="#dedbd3" stroke="#8f8f89"/>
      <rect x="30" y="268" width="185" height="18" fill="#d8d6cf"/>
      <text x="42" y="282" class="mono tiny">Prepare DEM (optional)</text>
      <text x="28" y="310" class="mono tiny muted">Extracts, merges and warps NASADEM HGT/zip tiles to match the aligned stack grid.</text>
      <text x="28" y="352" class="mono tiny">NASADEM files directory  *</text>
      <text x="28" y="391" class="mono tiny">Output DEM file  *</text>
      <rect x="250" y="338" width="525" height="24" fill="#f7f7f4" stroke="#8f8f89"/>
      <rect x="250" y="377" width="525" height="24" fill="#f7f7f4" stroke="#8f8f89"/>
      <rect x="785" y="333" width="82" height="32" fill="#d8d6cf" stroke="#8f8f89"/>
      <rect x="785" y="372" width="82" height="32" fill="#d8d6cf" stroke="#8f8f89"/>
      <text x="802" y="354" class="mono tiny">Browse...</text>
      <text x="802" y="393" class="mono tiny">Browse...</text>
      <text x="883" y="354" class="mono tiny" fill="#1565c0">?</text>
      <text x="883" y="393" class="mono tiny" fill="#1565c0">?</text>
      <rect x="803" y="413" width="96" height="32" fill="#d8d6cf" stroke="#8f8f89"/>
      <text x="818" y="434" class="mono tiny">Prepare DEM</text>

      <rect x="13" y="440" width="842" height="180" fill="#dedbd3" stroke="#8f8f89"/>
      <rect x="30" y="432" width="96" height="18" fill="#d8d6cf"/>
      <text x="42" y="446" class="mono tiny">Step 0 Log</text>
      <rect x="24" y="454" width="820" height="154" fill="#f7f7f4" stroke="#8f8f89"/>
      <text x="38" y="476" class="mono tiny">[51/57] Splitting phase_coh_20260424T153417_20260430T153514.tif</text>
      <text x="38" y="494" class="mono tiny">[52/57] Splitting phase_coh_20260424T153417_20260506T153417.tif</text>
      <text x="38" y="512" class="mono tiny">[53/57] Splitting phase_coh_20260430T153514_20260506T153417.tif</text>
      <text x="38" y="530" class="mono tiny">[57/57] Splitting phase_coh_20260512T153513_20260518T153418.tif</text>
      <text x="38" y="554" class="mono tiny">Split completed: 57 files.</text>
      <text x="38" y="586" class="mono tiny">Phase 2/2: Aligning rasters to common grid</text>
      <text x="38" y="604" class="mono tiny">Found 114 files to align. Calculating bounding boxes...</text>
      <rect x="823" y="456" width="16" height="148" fill="#dad8d0" stroke="#8f8f89"/>
      <rect x="825" y="575" width="12" height="28" fill="#c2c0b8" stroke="#8f8f89"/>
    </g>
  </g>
</svg>
