<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">openEO2Mintpy logo</title>
  <desc id="desc">A bridge-style logo connecting openEO InSAR GeoTIFF stacks to MintPy-ready time-series inputs.</desc>
  <defs>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f9bb4"/>
      <stop offset="0.5" stop-color="#26b68a"/>
      <stop offset="1" stop-color="#275b8f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e8f2f5"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0b3042" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="260" rx="28" fill="#ffffff"/>
  <rect x="22" y="22" width="916" height="216" rx="24" fill="url(#panel)" stroke="#d7e4e7"/>

  <g transform="translate(58 44)" filter="url(#softShadow)">
    <rect x="0" y="18" width="156" height="132" rx="22" fill="#ffffff" stroke="#c9dfe4" stroke-width="2"/>
    <path d="M26 104c24-44 70-66 112-52" fill="none" stroke="#1f9bb4" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 116c21-26 50-39 82-31" fill="none" stroke="#56c1b0" stroke-width="7" stroke-linecap="round"/>
    <path d="M54 128c18-13 37-18 58-13" fill="none" stroke="#93d265" stroke-width="6" stroke-linecap="round"/>
    <circle cx="72" cy="92" r="7" fill="#275b8f"/>
    <path d="M72 92l46-50" stroke="#275b8f" stroke-width="5" stroke-linecap="round"/>
    <text x="78" y="146" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#18364a">openEO</text>
  </g>

  <g transform="translate(260 78)">
    <path d="M0 52h260" stroke="url(#bridge)" stroke-width="16" stroke-linecap="round"/>
    <path d="M246 24l52 28-52 28" fill="none" stroke="url(#bridge)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#ffffff" stroke="#2d8f93" stroke-width="3">
      <rect x="34" y="16" width="52" height="74" rx="9"/>
      <rect x="104" y="16" width="52" height="74" rx="9"/>
      <rect x="174" y="16" width="52" height="74" rx="9"/>
    </g>
    <g font-family="JetBrains Mono, Consolas, monospace" font-size="14" font-weight="700" fill="#275b8f" text-anchor="middle">
      <text x="60" y="46">UNW</text>
      <text x="130" y="46">COR</text>
      <text x="200" y="46">RSC</text>
    </g>
    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#58707c" text-anchor="middle">
      <text x="130" y="110">split - align - prepare</text>
    </g>
  </g>

  <g transform="translate(614 44)" filter="url(#softShadow)">
    <rect x="0" y="18" width="156" height="132" rx="22" fill="#ffffff" stroke="#c9dfe4" stroke-width="2"/>
    <ellipse cx="78" cy="54" rx="48" ry="16" fill="#2d8f93"/>
    <path d="M30 54v62c0 9 21 16 48 16s48-7 48-16V54" fill="#eaf7f1" stroke="#2d8f93" stroke-width="5"/>
    <ellipse cx="78" cy="116" rx="48" ry="16" fill="#ffffff" stroke="#2d8f93" stroke-width="5"/>
    <path d="M51 82h54M51 99h54" stroke="#275b8f" stroke-width="5" stroke-linecap="round"/>
    <text x="78" y="146" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#18364a">MintPy</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#163244">
    <text x="58" y="212" font-size="28" font-weight="800">openEO2Mintpy</text>
    <text x="298" y="211" font-size="18" fill="#49636f">CDSE openEO Sentinel-1 InSAR GeoTIFFs to MintPy-ready stacks</text>
  </g>
</svg>
